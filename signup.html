<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - AuraDesign Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } }</script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
</head>
<body class="transition-colors duration-300">
    <div class="flex flex-col">
        <div class="min-h-screen flex">
           

            <!-- Main Form -->
            <div class="w-full flex items-center justify-center p-8 sm:p-12 relative">
                <div class="absolute top-8 right-8 flex gap-3">
                    <button class="rtl-toggle px-3 h-10 rounded-full bg-gray-100 dark:bg-slate-800 flex items-center justify-center hover:bg-gray-200 dark:hover:bg-slate-700 transition-colors text-xs font-bold text-gray-700 dark:text-gray-300" aria-label="Toggle RTL">
                        RTL
                    </button>
                    <button class="theme-toggle w-10 h-10 rounded-full bg-gray-100 dark:bg-slate-800 flex items-center justify-center hover:bg-gray-200 dark:hover:bg-slate-700 transition-colors text-gray-600 dark:text-gray-400" aria-label="Toggle Theme">
                        <i class="fa-solid fa-moon dark:hidden"></i>
                        <i class="fa-solid fa-sun hidden dark:block text-yellow-400"></i>
                    </button>
                </div>
                
                <div class="w-full max-w-md" data-aos="fade-up">
                    <div class="mb-10 text-center">
                        <a href="index.html" class="inline-flex items-center gap-3 mb-8">
                            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center text-white font-bold text-xl shadow-lg">
                                <i class="fa-solid fa-eye"></i>
                            </div>
                            <span class="font-bold text-2xl tracking-tight text-gray-900 dark:text-white">AuraDesign</span>
                        </a>
                        <h2 class="text-3xl font-bold mb-2">Create your account</h2>
                        <p class="text-gray-500">Already have an account? <a href="login.html" class="text-primary hover:underline">Log in</a></p>
                    </div>
                    
                    <!-- Social Auth -->
                    <div class="space-y-3 mb-8">
                        <button class="w-full flex items-center justify-center gap-3 bg-white text-gray-800 py-3 rounded-lg font-bold hover:bg-gray-100 transition-colors shadow-sm" aria-label="Sign up with Google">
                            <i class="fa-brands fa-google text-red-500"></i> Continue with Google
                        </button>
                        <button class="w-full flex items-center justify-center gap-3 bg-[#171515] text-white py-3 rounded-lg font-bold hover:bg-black transition-colors shadow-sm" aria-label="Sign up with GitHub">
                            <i class="fa-brands fa-github"></i> Continue with GitHub
                        </button>
                    </div>
                    
                    <div class="flex items-center gap-4 mb-8">
                        <div class="h-px bg-slate-700 flex-1"></div>
                        <span class="text-sm text-gray-500">or sign up with email</span>
                        <div class="h-px bg-slate-700 flex-1"></div>
                    </div>
                    
                    <form class="space-y-4">
                        <div class="space-y-1">
                            <label class="text-sm font-medium text-gray-700 dark:text-gray-300" for="fullname">Full Name</label>
                            <input type="text" id="fullname" class="w-full bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-lg px-4 py-3 text-gray-900 dark:text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-gray-400" placeholder="John Doe" required aria-required="true">
                        </div>

                        <div class="space-y-1">
                            <label class="text-sm font-medium text-gray-700 dark:text-gray-300" for="email">Email</label>
                            <input type="email" id="email" class="w-full bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-lg px-4 py-3 text-gray-900 dark:text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-gray-400" placeholder="you@company.com" required aria-required="true">
                        </div>

                        <div class="space-y-1">
                            <label class="text-sm font-medium text-gray-700 dark:text-gray-300" for="company">Company</label>
                            <input type="text" id="company" class="w-full bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-lg px-4 py-3 text-gray-900 dark:text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-gray-400" placeholder="Acme Inc." required aria-required="true">
                        </div>
                        
                        <div class="space-y-1 relative">
                            <label class="text-sm font-medium text-gray-700 dark:text-gray-300" for="password">Password</label>
                            <input type="password" id="password" class="w-full bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-lg px-4 py-3 text-gray-900 dark:text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all pr-10 placeholder:text-gray-400" placeholder="••••••••" required aria-required="true">
                            <button type="button" class="absolute right-3 top-9 text-gray-400 hover:text-white" aria-label="Toggle password visibility"><i class="fa-solid fa-eye-slash"></i></button>
                            
                            <!-- Password Strength Checker -->
                            <div class="flex gap-1 mt-2">
                                <div class="h-1 flex-1 bg-red-500 rounded-full"></div>
                                <div class="h-1 flex-1 bg-yellow-500 rounded-full"></div>
                                <div class="h-1 flex-1 bg-slate-700 rounded-full"></div>
                                <div class="h-1 flex-1 bg-slate-700 rounded-full"></div>
                            </div>
                            <p class="text-xs text-gray-500 mt-1">Fair: Add special characters</p>
                        </div>
                        
                        <button type="submit" class="w-full btn-primary py-3 rounded-lg mt-4 shadow-lg shadow-primary/20">Create Account</button>
                    </form>
                    
                    <p class="text-xs text-gray-500 mt-8 text-center">By creating an account, you agree to our <a href="#" class="text-primary hover:underline focus:outline-primary">Terms of Service</a> and <a href="#" class="text-primary hover:underline focus:outline-primary">Privacy Policy</a>.</p>
                </div>
            </div>
        </div>

       
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
